<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="680" viewBox="0 0 1360 680">
  <rect width="1360" height="680" rx="20" fill="#0D1B2A"/>

  <!-- Orbit rings -->
  <circle cx="340" cy="340" r="220" fill="none" stroke="#1A3A4A" stroke-width="2" stroke-dasharray="12 8"/>
  <circle cx="340" cy="340" r="150" fill="none" stroke="#1A3A4A" stroke-width="2"/>

  <!-- Spokes from center to nodes -->
  <g stroke="#1A3A4A" stroke-width="2">
    <line x1="340" y1="340" x2="560" y2="340"/>
    <line x1="340" y1="340" x2="450" y2="149"/>
    <line x1="340" y1="340" x2="230" y2="149"/>
    <line x1="340" y1="340" x2="120" y2="340"/>
    <line x1="340" y1="340" x2="230" y2="531"/>
    <line x1="340" y1="340" x2="450" y2="531"/>
  </g>

  <!-- Flow lines between nodes with arrowheads -->
  <line x1="560" y1="340" x2="234" y2="153" stroke="#00C9A7" stroke-width="2" opacity="0.7"/>
  <polygon points="234,153 247,168 221,163" fill="#00C9A7" opacity="0.9"/>
  <line x1="450" y1="153" x2="234" y2="527" stroke="#45B7D1" stroke-width="2" opacity="0.65"/>
  <polygon points="234,527 251,516 238,538" fill="#45B7D1" opacity="0.85"/>
  <line x1="228" y1="155" x2="446" y2="527" stroke="#4ECDC4" stroke-width="2" opacity="0.65"/>
  <polygon points="446,527 432,516 458,516" fill="#4ECDC4" opacity="0.85"/>
  <line x1="124" y1="340" x2="446" y2="157" stroke="#00C9A7" stroke-width="2" opacity="0.55"/>
  <polygon points="446,157 434,173 454,172" fill="#00C9A7" opacity="0.75"/>
  <line x1="230" y1="527" x2="556" y2="344" stroke="#45B7D1" stroke-width="2" opacity="0.55"/>
  <polygon points="556,344 542,357 544,331" fill="#45B7D1" opacity="0.75"/>
  <line x1="450" y1="527" x2="124" y2="344" stroke="#4ECDC4" stroke-width="2" opacity="0.7"/>
  <polygon points="124,344 138,331 138,357" fill="#4ECDC4" opacity="0.9"/>

  <!-- Cross lines -->
  <line x1="556" y1="340" x2="124" y2="340" stroke="#00C9A7" stroke-width="1.5" opacity="0.35"/>
  <line x1="450" y1="153" x2="450" y2="527" stroke="#45B7D1" stroke-width="1.5" opacity="0.35"/>
  <line x1="230" y1="153" x2="230" y2="527" stroke="#4ECDC4" stroke-width="1.5" opacity="0.35"/>

  <!-- Center ring -->
  <circle cx="340" cy="340" r="62" fill="#00C9A7"/>
  <circle cx="340" cy="340" r="48" fill="#0D1B2A"/>

  <!-- Orbit nodes -->
  <circle cx="560" cy="340" r="30" fill="#00C9A7" stroke="#0D1B2A" stroke-width="5"/>
  <circle cx="560" cy="340" r="10" fill="#0D1B2A"/>
  <circle cx="450" cy="149" r="24" fill="#45B7D1" stroke="#0D1B2A" stroke-width="5"/>
  <circle cx="450" cy="149" r="8" fill="#0D1B2A"/>
  <circle cx="230" cy="149" r="24" fill="#4ECDC4" stroke="#0D1B2A" stroke-width="5"/>
  <circle cx="230" cy="149" r="8" fill="#0D1B2A"/>
  <circle cx="120" cy="340" r="30" fill="#00C9A7" stroke="#0D1B2A" stroke-width="5"/>
  <circle cx="120" cy="340" r="10" fill="#0D1B2A"/>
  <circle cx="230" cy="531" r="24" fill="#45B7D1" stroke="#0D1B2A" stroke-width="5"/>
  <circle cx="230" cy="531" r="8" fill="#0D1B2A"/>
  <circle cx="450" cy="531" r="24" fill="#4ECDC4" stroke="#0D1B2A" stroke-width="5"/>
  <circle cx="450" cy="531" r="8" fill="#0D1B2A"/>

  <!-- Wordmark -->
  <text x="680" y="298" font-family="Calibri, Arial, sans-serif" font-size="110" font-weight="700" fill="#FFFFFF">Units</text>
  <text x="980" y="298" font-family="Calibri, Arial, sans-serif" font-size="110" font-weight="700" fill="#00C9A7">360</text>
  <text x="1172" y="298" font-family="Calibri, Arial, sans-serif" font-size="68" font-weight="300" fill="#8ECAE6">.ai</text>

  <!-- Underrule -->
  <line x1="680" y1="322" x2="1240" y2="322" stroke="#00C9A7" stroke-width="3" opacity="0.6"/>

  <!-- Tagline -->
  <text x="680" y="356" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="400" letter-spacing="2" fill="#8ECAE6">UNITS MANAGEMENT FOR THE AI ECONOMY</text>
</svg>
